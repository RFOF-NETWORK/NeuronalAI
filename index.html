<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuronalAI - PRAI System</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; color: #00ffcc; font-family: 'Courier New', monospace; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #ui-layer { position: relative; z-index: 10; pointer-events: none; height: 100%; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; }
        .panel { background: rgba(0, 20, 20, 0.7); border: 1px solid #00ffcc; padding: 15px; pointer-events: auto; backdrop-filter: blur(5px); box-shadow: 0 0 15px rgba(0, 255, 204, 0.2); }
        .sidebar { width: 300px; max-height: 80vh; overflow-y: auto; }
        button { background: #00ffcc; color: #000; border: none; padding: 10px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; transition: 0.3s; }
        button:hover { background: #fff; box-shadow: 0 0 10px #fff; }
        .node-item { padding: 8px; border-bottom: 1px solid #004444; cursor: pointer; }
        .node-item:hover { background: rgba(0, 255, 204, 0.1); }
        #status-bar { font-size: 0.85rem; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ui-layer">
        <div class="sidebar panel">
            <h2>PZQQET CORE</h2>
            <div id="node-list">
                </div>
            <button onclick="praiApp.createNewNode()">+ NEURON INITIALISIEREN</button>
        </div>
        
        <div id="status-bar" class="panel">
            SYSTEM: ACTIVE | MODE: PRAI-ORBITAL | ENCRYPTION: 100M%
        </div>
    </div>

        <script id="vs" type="x-shader/x-vertex">
    attribute vec3 position;
    uniform mat4 u_mvp;
    void main() {
        gl_Position = u_mvp * vec4(position, 1.0);
    }
</script>

<script id="fs" type="x-shader/x-fragment">
    precision mediump float;
    uniform vec4 u_color;
    void main() {
        gl_FragColor = u_color;
    }
</script>

<script>
    // Diese kleine Logik stellt sicher, dass die Shader für den Loader bereitstehen
    window.PRAI_SHADERS = {
        vertex: document.getElementById('vs').text,
        fragment: document.getElementById('fs').text
    };
    
    console.log("3D-Kern-Logik in Index injiziert. Bereit für Orbitale.");
</script>

    <script src="api.js"></script>
    <script src="app.js"></script>

    <script src="universe/loader.js"></script>

    <script>
        window.addEventListener('load', async () => {
            try {
                // Initialisiert die Haupt-App (app.js)
                await praiApp.init();
                
                // Startet den UniverseLoader, der die Szenen (Shell, Erde, Core) lädt
                if (typeof UniverseLoader !== 'undefined') {
                    console.log("Starte Orbital-Szenen-Discovery...");
                    await UniverseLoader.loadAll();
                } else {
                    console.warn("UniverseLoader nicht gefunden. Prüfe Pfad: universe/loader.js");
                }
            } catch (err) {
                console.error("Boot-Fehler:", err);
            }
        });
    </script>
</body>
</html>
