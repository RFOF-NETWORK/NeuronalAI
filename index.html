<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuronalAI - PRAI System</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #050505; color: #00ffcc; font-family: 'Courier New', monospace; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #ui-layer { position: relative; z-index: 10; pointer-events: none; height: 100%; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; }
        .panel { background: rgba(0, 20, 20, 0.8); border: 1px solid #00ffcc; padding: 15px; pointer-events: auto; backdrop-filter: blur(5px); }
        .sidebar { width: 300px; height: 100%; overflow-y: auto; }
        .info-panel { position: absolute; right: 20px; top: 20px; width: 250px; }
        button { background: #00ffcc; color: #000; border: none; padding: 8px 12px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        button:hover { background: #fff; }
        h2 { font-size: 1.2rem; margin-top: 0; border-bottom: 1px solid #00ffcc; }
        .node-item { cursor: pointer; padding: 5px; border-bottom: 1px solid #004444; }
        .node-item:hover { background: #003333; }
        #status-bar { font-size: 0.8rem; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="ui-layer">
        <div class="sidebar panel" id="sidebar">
            <h2>NEURONAL AI CORE</h2>
            <div id="node-list"></div>
            <button onclick="praiApp.createNewNode()">+ Neuron hinzufügen</button>
        </div>
        <div id="status-bar" class="panel">System: Online | PRAI-Mode: Active</div>
    </div>
    <div class="info-panel panel" id="info-panel" style="display:none;">
        <h3>Knoten Details</h3>
        <div id="details-content"></div>
        <button onclick="document.getElementById('info-panel').style.display='none'">Schließen</button>
    </div>

    <script src="api.js"></script>
    <script src="app.js"></script>
    <script>
        window.addEventListener('load', async () => {
            await praiApp.init();
        });
    </script>
</body>
</html>
