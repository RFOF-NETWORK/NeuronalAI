<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NeuronalAI - PRAI System</title>
    <style>
        :root {
            --color-primary: #00ffcc;
            --color-bg: #000000;
            --color-panel: rgba(0, 20, 20, 0.8);
            --border-glow: 0 0 15px rgba(0, 255, 204, 0.3);
            --font-main: 'Courier New', monospace;
            --spacing-unit: 20px;
        }

        * {
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            touch-action: none;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: var(--color-bg);
            color: var(--color-primary);
            font-family: var(--font-main);
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            perspective: 1000px;
        }

        #ui-layer {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: grid;
            grid-template-areas: 
                "aside main"
                "footer footer";
            grid-template-columns: 320px 1fr;
            grid-template-rows: 1fr auto;
            padding: var(--spacing-unit);
            gap: var(--spacing-unit);
        }

        .panel {
            background: var(--color-panel);
            border: 1px solid var(--color-primary);
            backdrop-filter: blur(10px);
            box-shadow: var(--border-glow);
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        aside.sidebar {
            grid-area: aside;
            max-height: 100%;
            overflow: hidden;
        }

        header.panel-header {
            padding: 15px;
            border-bottom: 1px solid var(--color-primary);
            flex-shrink: 0;
        }

        header h2 {
            margin: 0;
            font-size: 1.2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        section.node-container {
            flex-grow: 1;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--color-primary) transparent;
        }

        section.node-container::-webkit-scrollbar {
            width: 4px;
        }

        section.node-container::-webkit-scrollbar-thumb {
            background: var(--color-primary);
        }

        .node-list {
            display: flex;
            flex-direction: column;
        }

        .node-item {
            padding: 12px 15px;
            border-bottom: 1px solid rgba(0, 255, 204, 0.1);
            cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.2s ease;
        }

        .node-item:hover {
            background: rgba(0, 255, 204, 0.15);
        }

        footer.status-bar {
            grid-area: footer;
            padding: 10px 20px;
            font-size: 0.75rem;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: var(--color-primary);
            color: #000;
            border: none;
            padding: 12px;
            font-family: var(--font-main);
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            width: calc(100% - 30px);
            margin: 15px;
            flex-shrink: 0;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background: #fff;
            box-shadow: 0 0 20px #fff;
            transform: translateY(-2px);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        #info-panel {
            position: fixed;
            right: var(--spacing-unit);
            top: var(--spacing-unit);
            width: 300px;
            max-height: 400px;
            display: none;
            z-index: 11;
        }

        pre {
            margin: 0;
            padding: 15px;
            font-size: 0.8rem;
            overflow-x: auto;
            color: #a0ffee;
        }
    </style>
</head>
<body>

    <main id="canvas-container"></main>

    <div id="ui-layer">
        <aside class="sidebar panel">
            <header class="panel-header">
                <h2>PZQQET CORE</h2>
            </header>
            <section class="node-container" id="node-list-container">
                <div id="node-list" class="node-list"></div>
            </section>
            <button class="btn-primary" onclick="praiApp.createNewNode()">+ Neuron Initialisieren</button>
        </aside>

        <footer class="status-bar panel">
            <span>SYSTEM: ACTIVE</span>
            <span>ENCRYPTION: 100M%</span>
            <span id="coord-display">X:0.00 Y:0.00 Z:0.00</span>
        </footer>
    </div>

    <section id="info-panel" class="panel">
        <header class="panel-header">
            <h3>Knoten Details</h3>
        </header>
        <div id="details-content"></div>
        <button class="btn-primary" style="margin: 10px; width: auto;" onclick="document.getElementById('info-panel').style.display='none'">Schließen</button>
    </section>

    <script id="vs" type="x-shader/x-vertex">
        attribute vec3 position;
        uniform mat4 u_mvp;
        void main() {
            gl_Position = u_mvp * vec4(position, 1.0);
        }
    </script>

    <script id="fs" type="x-shader/x-fragment">
        precision mediump float;
        uniform vec4 u_color;
        void main() {
            gl_FragColor = u_color;
        }
    </script>

    <script>
        window.PRAI_SHADERS = {
            vertex: document.getElementById('vs').text,
            fragment: document.getElementById('fs').text
        };

        window.addEventListener('load', async () => {
            try {
                if (typeof praiApp !== 'undefined') {
                    await praiApp.init();
                }
                
                if (typeof UniverseLoader !== 'undefined') {
                    await UniverseLoader.loadAll();
                }
            } catch (err) {
                console.error("PRAI-Core initialization error:", err);
            }
        });

        // Navigation Sync
        document.addEventListener('mousemove', (e) => {
            const x = ((e.clientX / window.innerWidth) - 0.5).toFixed(2);
            const y = ((e.clientY / window.innerHeight) - 0.5).toFixed(2);
            document.getElementById('coord-display').innerText = `X:${x} Y:${y} Z:0.00`;
        });
    </script>

    <script src="api.js"></script>
    <script src="app.js"></script>
    <script src="universe/loader.js"></script>
</body>
</html>
